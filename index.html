<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitWin</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Bienvenido a FitWin 💪</h1>

<div id="botonesInicio">
    <button onclick="mostrarRegistro()">Registrar</button>
    <button onclick="mostrarLogin()">Login</button>
</div>

<div id="registro" style="display:none;">
    <h2>Crear cuenta</h2>

    <input type="text" id="usuarioRegistro" placeholder="Nombre">
    <input type="email" id="emailRegistro" placeholder="Email">
    <input type="password" id="passwordRegistro" placeholder="Contraseña">

    <button onclick="crearCuenta()">Crear cuenta</button>
</div>

<div id="login" style="display:none;">
    <h2>Iniciar sesión</h2>

    <input type="email" id="emailLogin" placeholder="Email">
    <input type="password" id="passwordLogin" placeholder="Contraseña">

    <button onclick="iniciarSesion()">Entrar</button>
</div>

<div id="perfil" style="display:none;">

    <div class="barraSuperior">
        <img
            id="fotoPerfil"
            src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
            alt="Foto de perfil"
            onclick="mostrarMenuPerfil()">

        <span id="nombreUsuario"></span>
    </div>

    <div id="menuPerfil" style="display:none;">
        <button
            </div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script src="script.js"></script>

</body>
        </html>
