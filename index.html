<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitWin</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Bienvenido a FitWin 💪</h1>

<div id="botonesInicio">
    <button onclick="mostrarRegistro()">Registrar</button>
    <button onclick="mostrarLogin()">Login</button>
</div>

<div id="registro" style="display:none;">
    <h2>Crear cuenta</h2>

    <input type="text" id="usuarioRegistro" placeholder="Nombre">
    <input type="email" id="emailRegistro" placeholder="Email">
    <input type="password" id="passwordRegistro" placeholder="Contraseña">

    <button onclick="crearCuenta()">Crear cuenta</button>
</div>

<div id="login" style="display:none;">
    <h2>Iniciar sesión</h2>

    <input type="email" id="emailLogin" placeholder="Email">
    <input type="password" id="passwordLogin" placeholder="Contraseña">

    <button onclick="iniciarSesion()">Entrar</button>
</div>

<div id="perfil" style="display:none;">

    <div class="barraSuperior">
        <img
            id="fotoPerfil"
            src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
            alt="Foto de perfil"
            onclick="mostrarMenuPerfil()">

        <span id="nombreUsuario"></span>
    </div>
    <div id="menuPerfil" style="display:none;">
    <button onclick="cerrarSesion()">Cerrar sesión</button>
        <p>🏆 Récord: <span id="record">0</span> flexiones</p>
        <p>💪 Flexiones de esta sesión: <span id="contadorPerfil">0</span></p>
<p>💰 Dinero total: <span id="dineroPerfil">0,00 €</span></p>
</div>

<h2>💰 Dinero ganado</h2>
<div id="dinero">0,00 €</div>

<h3>Contador de flexiones</h3>
<div id="contador">0</div>

<button onclick="sumarFlexion()">+1 Flexión</button>
<button onclick="reiniciarFlexiones()">Reiniciar</button>
<button onclick="empezarFlexiones()">💪 Empezar flexiones</button>
    <button onclick="guardarProgreso()">💾 Guardar progreso</button>
<button onclick="mostrarRanking()">🏆 Ranking</button>

<div id="ranking" style="display:none;">
    <h2>🏆 Ranking FitWin</h2>
    <div id="listaRanking"></div>
</div>
<video id="camara" autoplay playsinline width="300"></video>

</div>

    

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script src="script.js"></script>
            
            
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCbGtoZmooATzzcN7HBtNHJLt5niQ9t3AI",
    authDomain: "fitwin-242a6.firebaseapp.com",
    projectId: "fitwin-242a6",
    storageBucket: "fitwin-242a6.firebasestorage.app",
    messagingSenderId: "560112804480",
    appId: "1:560112804480:web:d596bad8a2b54e41e97c65"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
window.setDoc = setDoc;
window.getDoc = getDoc;
window.doc = doc;
  window.db = db;
</script>
</body>
        </html>
